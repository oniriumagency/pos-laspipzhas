<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — Pipzhas POS</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f6f7fa;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #111827;
    }
    .container {
      text-align: center;
      padding: 2rem;
      max-width: 400px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      display: block;
    }
    h1 { font-size: 1.75rem; font-weight: 900; margin-bottom: 0.5rem; }
    p { color: #6b7280; margin-bottom: 1.5rem; line-height: 1.6; }
    button {
      background: #ea580c;
      color: white;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 1rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { background: #c2410c; }
  </style>
</head>
<body>
  <div class="container">
    <span class="icon">🍕</span>
    <h1>Sin conexión</h1>
    <p>No hay internet disponible. Puedes seguir navegando por las secciones ya cargadas del sistema.</p>
    <button onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>
